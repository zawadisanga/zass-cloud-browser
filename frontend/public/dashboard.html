<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZASS Cloud Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 2em; font-weight: bold; color: #667eea; }
        input, select, button, textarea {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin: 5px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #5a67d8; }
        img { max-width: 100%; border-radius: 10px; margin-top: 20px; }
        .url-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .url-group input { flex: 1; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>☁️ ZASS Cloud Browser</h1>
            <p>Professional Screenshot & PDF API | Fast | Reliable</p>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat"><div class="stat-value" id="requests">0</div><div>Total Requests</div></div>
            <div class="stat"><div class="stat-value" id="workers">0</div><div>Active Workers</div></div>
            <div class="stat"><div class="stat-value" id="cache">0</div><div>Cache Hits</div></div>
            <div class="stat"><div class="stat-value" id="uptime">0</div><div>Uptime (s)</div></div>
        </div>
        
        <div class="card">
            <h2>🎯 Quick Screenshot</h2>
            <div class="url-group">
                <input type="text" id="url" placeholder="https://example.com" value="https://google.com">
                <select id="format">
                    <option value="png">PNG Image</option>
                    <option value="pdf">PDF Document</option>
                </select>
                <button onclick="capture()">📸 Capture</button>
            </div>
            <div id="result"></div>
        </div>
        
        <div class="card">
            <h2>📦 Batch Screenshots</h2>
            <textarea id="batchUrls" rows="3" placeholder="https://google.com&#10;https://github.com&#10;https://stackoverflow.com"></textarea>
            <button onclick="batchCapture()">⚡ Batch Capture (Max 10)</button>
            <div id="batchResult"></div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            const res = await fetch('/api/stats');
            const stats = await res.json();
            document.getElementById('requests').textContent = stats.requests || 0;
            document.getElementById('workers').textContent = stats.workers?.available || 0;
            document.getElementById('cache').textContent = stats.cacheHits || 0;
            document.getElementById('uptime').textContent = Math.floor(stats.uptime || 0);
        }
        
        async function capture() {
            const url = document.getElementById('url').value;
            const format = document.getElementById('format').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<div class="loader"></div><p>Rendering...</p>';
            
            try {
                const res = await fetch(`/api/render?url=${encodeURIComponent(url)}&format=${format}`);
                if (format === 'pdf') {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    resultDiv.innerHTML = `<iframe src="${url}" width="100%" height="600px"></iframe>`;
                } else {
                    const blob = await res.blob();
                    const imgUrl = URL.createObjectURL(blob);
                    resultDiv.innerHTML = `<img src="${imgUrl}" alt="Screenshot">`;
                }
                loadStats();
            } catch (error) {
                resultDiv.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            }
        }
        
        async function batchCapture() {
            const urlsText = document.getElementById('batchUrls').value;
            const urls = urlsText.split('\n').filter(u => u.trim()).slice(0, 10);
            const resultDiv = document.getElementById('batchResult');
            
            resultDiv.innerHTML = '<div class="loader"></div><p>Processing batch...</p>';
            
            const res = await fetch('/api/batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ urls, format: 'png' })
            });
            const data = await res.json();
            
            resultDiv.innerHTML = '<h3>Results:</h3>' + data.results.map(r => `
                <div style="border:1px solid #ddd; padding:10px; margin:10px 0; border-radius:10px;">
                    <strong>${r.url}</strong>: ${r.success ? '✅ Success' : '❌ ' + r.error}
                    ${r.success ? `<br><img src="data:image/png;base64,${r.data}" style="max-height:200px; margin-top:10px;">` : ''}
                </div>
            `).join('');
            loadStats();
        }
        
        setInterval(loadStats, 3000);
        loadStats();
    </script>
</body>
</html>
