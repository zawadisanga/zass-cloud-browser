<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cloud Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .register-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error {
            background: rgba(244,67,54,0.2);
            color: #f44336;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        .success {
            background: rgba(76,175,80,0.2);
            color: #4caf50;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        .api-key-box {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #a0a0a0;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>📝 Cloud Browser</h1>
        <div class="subtitle">Create your free account</div>
        
        <div id="message"></div>
        
        <input type="text" id="fullName" placeholder="Full Name (optional)">
        <input type="email" id="email" placeholder="Email address">
        <input type="password" id="password" placeholder="Password (min 6 characters)">
        <button onclick="register()">Create Account</button>
        
        <div class="login-link">
            Already have an account? <a href="/login.html">Login here</a>
        </div>
    </div>
    
    <script>
        async function register() {
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            if (!email || !password) {
                messageDiv.innerHTML = '<div class="error">❌ Email and password required</div>';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.innerHTML = '<div class="error">❌ Password must be at least 6 characters</div>';
                return;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name: fullName })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    messageDiv.innerHTML = `
                        <div class="success">✅ Account created successfully!</div>
                        <div class="api-key-box">
                            <strong>🔑 Your API Key:</strong><br>
                            ${data.api_key}<br><br>
                            <small>Save this key! You'll need it for API requests.</small>
                        </div>
                    `;
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 5000);
                } else {
                    messageDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                }
            } catch (error) {
                messageDiv.innerHTML = `<div class="error">❌ Registration failed: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
