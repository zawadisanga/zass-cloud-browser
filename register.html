<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZASS Enterprise - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0c29 50%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            width: 500px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 32px; margin-bottom: 10px; background: linear-gradient(135deg, #fff, #667eea); -webkit-background-clip: text; background-clip: text; color: transparent; }
        input, select {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        a { color: #667eea; text-decoration: none; }
        .error { color: #ff6b6b; text-align: center; margin-top: 15px; display: none; }
        .success { color: #00ff00; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝 Enterprise Registration</h1>
        <p style="color: #aaa; margin-bottom: 20px;">Create your ZASS Enterprise account</p>
        
        <form id="registerForm">
            <input type="text" id="company" placeholder="Company Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="tel" id="phone" placeholder="Phone Number (optional)">
            <input type="password" id="password" placeholder="Password (min 8 characters)" required>
            <select id="plan">
                <option value="startup">Startup - $49/month (5,000 requests)</option>
                <option value="business">Business - $99/month (15,000 requests)</option>
                <option value="enterprise">Enterprise - $299/month (unlimited)</option>
            </select>
            <button type="submit">Register →</button>
        </form>
        
        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>
        
        <p style="margin-top: 20px; text-align: center;">Already have an account? <a href="/login">Login here</a></p>
        <p style="margin-top: 15px; text-align: center;"><a href="/">← Back to Home</a></p>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const company = document.getElementById('company').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const plan = document.getElementById('plan').value;
            
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (password.length < 8) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Password must be at least 8 characters';
                return;
            }
            
            try {
                const response = await fetch('/api/enterprise/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        company_name: company, 
                        email: email, 
                        phone: phone, 
                        password: password, 
                        plan: plan 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.style.display = 'block';
                    successDiv.innerHTML = `✅ Registration successful!<br>API Key: <code style="background:#000;padding:2px 5px;">${data.api_key}</code><br>Please complete payment to activate.`;
                    
                    // Save API key for later
                    localStorage.setItem('pendingApiKey', data.api_key);
                    
                    setTimeout(() => {
                        window.location.href = '/payment';
                    }, 3000);
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ ' + (data.error || 'Registration failed');
                }
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Registration failed: ' + error.message;
            }
        };
    </script>
</body>
</html>
