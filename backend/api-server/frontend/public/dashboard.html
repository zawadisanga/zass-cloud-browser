<!-- frontend/public/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZASS Cloud Browser - Professional Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 10px; }
        .main-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        input, select, button {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #5a67d8; transform: translateY(-2px); }
        .result-area {
            margin-top: 30px;
            text-align: center;
        }
        img { max-width: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .url-input-group input { flex: 1; }
        .batch-input {
            margin-top: 20px;
            padding: 20px;
            background: #f7f7f7;
            border-radius: 10px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: monospace;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>☁️ ZASS Cloud Browser Enterprise</h1>
            <p>World-Class Browser Automation | Fast | Reliable | Global CDN</p>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-value" id="totalRequests">0</div><div class="stat-label">Total Requests</div></div>
            <div class="stat-card"><div class="stat-value" id="cacheHits">0</div><div class="stat-label">Cache Hits</div></div>
            <div class="stat-card"><div class="stat-value" id="activeWorkers">0</div><div class="stat-label">Active Workers</div></div>
            <div class="stat-card"><div class="stat-value" id="uptime">0</div><div class="stat-label">Uptime (seconds)</div></div>
        </div>
        
        <div class="main-card">
            <h2>🎯 Quick Render</h2>
            <div class="url-input-group">
                <input type="text" id="singleUrl" placeholder="https://example.com" value="https://zass.website">
                <select id="format">
                    <option value="png">PNG Screenshot</option>
                    <option value="pdf">PDF Document</option>
                </select>
                <button onclick="renderSingle()">🚀 Render Now</button>
            </div>
            <div class="result-area" id="singleResult"></div>
            
            <div class="batch-input">
                <h3>📦 Batch Render (Up to 100 URLs)</h3>
                <textarea id="batchUrls" rows="4" placeholder="https://example1.com&#10;https://example2.com&#10;https://example3.com"></textarea>
                <button onclick="renderBatch()" style="margin-top: 10px;">⚡ Batch Render</button>
                <div id="batchResult"></div>
            </div>
        </div>
    </div>
    
    <script>
        async function fetchStats() {
            const res = await fetch('/api/stats');
            const stats = await res.json();
            document.getElementById('totalRequests').textContent = stats.totalRequests || 0;
            document.getElementById('cacheHits').textContent = stats.cacheHits || 0;
            document.getElementById('activeWorkers').textContent = stats.workers?.total || 0;
            document.getElementById('uptime').textContent = Math.floor(stats.uptime || 0);
        }
        
        async function renderSingle() {
            const url = document.getElementById('singleUrl').value;
            const format = document.getElementById('format').value;
            const resultDiv = document.getElementById('singleResult');
            resultDiv.innerHTML = '<div class="loader"></div><p>Rendering your page...</p>';
            
            try {
                const res = await fetch(`/api/render?url=${encodeURIComponent(url)}&format=${format}`);
                if (format === 'pdf') {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    resultDiv.innerHTML = `<iframe src="${url}" width="100%" height="600px"></iframe>`;
                } else {
                    const blob = await res.blob();
                    const imgUrl = URL.createObjectURL(blob);
                    resultDiv.innerHTML = `<img src="${imgUrl}" alt="Screenshot">`;
                }
                fetchStats();
            } catch (error) {
                resultDiv.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            }
        }
        
        async function renderBatch() {
            const urlsText = document.getElementById('batchUrls').value;
            const urls = urlsText.split('\n').filter(u => u.trim());
            const resultDiv = document.getElementById('batchResult');
            resultDiv.innerHTML = '<div class="loader"></div><p>Processing batch...</p>';
            
            const res = await fetch('/api/batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ urls, format: 'png' })
            });
            const results = await res.json();
            
            resultDiv.innerHTML = '<h3>Batch Results:</h3><div style="display:grid;gap:10px;">' +
                results.map(r => `<div style="padding:10px;border:1px solid #e0e0e0;border-radius:10px;">
                    <strong>${r.url}</strong>: ${r.success ? '✅ Success' : '❌ ' + r.error}
                    ${r.success ? `<br><img src="data:image/png;base64,${r.data}" style="max-height:200px;margin-top:10px;">` : ''}
                </div>`).join('') + '</div>';
            fetchStats();
        }
        
        setInterval(fetchStats, 5000);
        fetchStats();
    </script>
</body>
</html>
