<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Cloud Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 {
            color: white;
            margin-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: white;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            color: white;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        th {
            color: #667eea;
        }
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(244,67,54,0.8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="logout-btn" onclick="logout()">Logout</button>
    
    <div class="container">
        <div class="header">
            <h1>👑 Admin Dashboard</h1>
            <p>Cloud Browser Enterprise Management</p>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div>Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRequests">0</div>
                <div>Total API Requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayRequests">0</div>
                <div>Today's Requests</div>
            </div>
        </div>
        
        <div class="card">
            <h2>📊 User Analytics</h2>
            <div id="userTable">Loading...</div>
        </div>
    </div>
    
    <script>
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login';
        }
        
        async function loadAdminData() {
            try {
                const usersRes = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const usersData = await usersRes.json();
                
                const usageRes = await fetch('/api/admin/usage', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const usageData = await usageRes.json();
                
                document.getElementById('totalUsers').textContent = usersData.users?.length || 0;
                document.getElementById('totalRequests').textContent = usageData.usage?.reduce((sum, u) => sum + u.total_requests, 0) || 0;
                
                const userTable = document.getElementById('userTable');
                if (usersData.users && usersData.users.length > 0) {
                    userTable.innerHTML = `
                        <table>
                            <thead>
                                <tr><th>Email</th><th>Name</th><th>Plan</th><th>API Key</th><th>Created</th></tr>
                            </thead>
                            <tbody>
                                ${usersData.users.map(user => `
                                    <tr>
                                        <td>${user.email}</td>
                                        <td>${user.full_name || '-'}</td>
                                        <td>${user.plan}</td>
                                        <td><code>${user.api_key.substring(0, 20)}...</code></td>
                                        <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                }
            } catch (error) {
                if (error.status === 401) {
                    window.location.href = '/login';
                }
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        loadAdminData();
        setInterval(loadAdminData, 30000);
    </script>
</body>
</html>
